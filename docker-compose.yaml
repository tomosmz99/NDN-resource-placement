version: "3"
services:
  ndn-producer:
    container_name: ndn-producer
    build:
      context: .
    privileged: true
    networks:
      - ndn-network
    volumes:
      - ./work:/work
    environment:
      - NODE_NAME=producer_1
      - CPU_MODEL=Intel Core i7-2026
      - PASSMARK=12000
    tty: true

  ndn-consumer:
    container_name: ndn-consumer
    build:
      context: .
    networks:
      - ndn-network
    volumes:
      - ./work:/work
    tty: true

  ndn-manager:
    container_name: ndn-manager
    build:
      context: .
    networks:
      - ndn-network
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./work:/work
    tty: true

  worker-task-image:
    image: dockerprac-ndn-worker-task  # Spyがこの名前で呼び出すための名前付け
    build: .                           # 同じ階層に Dockerfile があるのでこれで自動認識されます
    profiles: ["build-only"]           # up時に自動起動させないための設定

networks:
  ndn-network: